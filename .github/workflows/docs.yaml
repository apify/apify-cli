name: docs

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    build:
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

        environment:
            name: github-pages

        permissions:
            contents: write
            pages: write
            id-token: write

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.1.2

            - name: Build docs
              run: |
                  pnpm run update-docs
                  pnpm --filter apify-cli-website add @apify/docs-theme@latest
                  pnpm --filter apify-cli-website run build
              env:
                  SMARTLOOK_PROJECT_KEY: ${{ secrets.SMARTLOOK_DOCS_PROJECT_KEY }}
                  GIT_USER: "apify-service-account:${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}"
                  GH_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
                  APIFY_SIGNING_TOKEN: ${{ secrets.APIFY_SIGNING_TOKEN }}
                  SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN }}

            - name: Commit the updated package(-lock).json
              uses: apify/actions/signed-commit@v1.1.2
              with:
                  message: "chore: Automatic theme updating workflow [skip ci]"
                  add: 'website/package.json pnpm-lock.yaml'
                  github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            - name: Set up GitHub Pages
              uses: actions/configure-pages@v6

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ./website/build

            - name: Deploy artifact to GitHub Pages
              uses: actions/deploy-pages@v5

            - name: Invalidate CloudFront cache
              run: |
                  gh workflow run invalidate-cloudfront.yml \
                      --repo apify/apify-docs-private \
                      --field deployment=apify-docs
                  echo "✅ CloudFront cache invalidation workflow triggered successfully"
              env:
                  GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
