name: docs

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    build:
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

        environment:
            name: github-pages

        permissions:
            contents: write
            pages: write
            id-token: write

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: apify/workflows/pnpm-install@main

            - name: Build docs
              run: |
                  pnpm run update-docs
                  pnpm --filter apify-cli-website add @apify/docs-theme@latest
                  pnpm --filter apify-cli-website run build
              env:
                  SMARTLOOK_PROJECT_KEY: ${{ secrets.SMARTLOOK_DOCS_PROJECT_KEY }}
                  GIT_USER: "apify-service-account:${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}"
                  GH_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
                  APIFY_SIGNING_TOKEN: ${{ secrets.APIFY_SIGNING_TOKEN }}
                  SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN }}

            - name: Stage updated package(-lock).json
              id: stage-package
              run: |
                  git add website/package.json website/package-lock.json pnpm-lock.yaml 2>/dev/null || true
                  if git diff --cached --quiet; then
                    echo "has-changes=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "has-changes=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Commit the updated package(-lock).json
              if: steps.stage-package.outputs.has-changes == 'true'
              uses: apify/workflows/commit@v0.44.0
              with:
                  commit-message: "chore: Automatic theme updating workflow [skip ci]"
                  github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            - name: Set up GitHub Pages
              uses: actions/configure-pages@v6

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ./website/build

            - name: Deploy artifact to GitHub Pages
              uses: actions/deploy-pages@v5

            - name: Invalidate CloudFront cache
              run: |
                  gh workflow run invalidate-cloudfront.yml \
                      --repo apify/apify-docs-private \
                      --field deployment=apify-docs
                  echo "✅ CloudFront cache invalidation workflow triggered successfully"
              env:
                  GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
