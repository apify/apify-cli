name: docs

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    build:
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

        environment:
            name: github-pages

        permissions:
            contents: write
            pages: write
            id-token: write

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: ./.github/actions/pnpm-install

            - name: Build docs
              run: |
                  # update next docs reference
                  pnpm run update-docs
                  # go to website dir
                  cd website
                  # install website deps
                  pnpm install
                  # install the latest theme version
                  pnpm add @apify/docs-theme@latest
                  # build the docs
                  pnpm run build
              env:
                  SMARTLOOK_PROJECT_KEY: ${{ secrets.SMARTLOOK_DOCS_PROJECT_KEY }}
                  GIT_USER: "apify-service-account:${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}"
                  GH_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
                  APIFY_SIGNING_TOKEN: ${{ secrets.APIFY_SIGNING_TOKEN }}
                  SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN }}

            - name: Commit the updated package(-lock).json
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: "chore: Automatic theme updating workflow [skip ci]"
                  file_pattern: "website/package*.json website/pnpm-lock.yaml"
                  commit_user_name: Apify Bot
                  commit_user_email: my-github-actions-bot@example.org
                  commit_author: Apify Bot <apify@apify.com>

            - name: Set up GitHub Pages
              uses: actions/configure-pages@v6

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ./website/build

            - name: Deploy artifact to GitHub Pages
              uses: actions/deploy-pages@v5

            - name: Invalidate CloudFront cache
              run: |
                  gh workflow run invalidate-cloudfront.yml \
                      --repo apify/apify-docs-private \
                      --field deployment=apify-docs
                  echo "✅ CloudFront cache invalidation workflow triggered successfully"
              env:
                  GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
